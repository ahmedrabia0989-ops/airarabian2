<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Feedback | Air Arabian Travels</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{margin:0;font-family:Poppins,sans-serif;background:#f5f5f5}.main{max-width:900px;margin:30px auto}.cardx{background:#fff;border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.08);padding:18px}.star{font-size:1.5rem;color:#c9c9c9;cursor:pointer}.star.active{color:#FFD700}</style></head><body><main class="main"><div class="cardx"><h3 class="h5 fw-bold">Send Feedback</h3><form><div class="row g-3"><div class="col-md-6"><label class="form-label">Subject</label><input name="subject" class="form-control"></div><div class="col-md-6"><label class="form-label d-block">Rating</label><span class="star" data-rate="1">?</span><span class="star" data-rate="2">?</span><span class="star" data-rate="3">?</span><span class="star" data-rate="4">?</span><span class="star" data-rate="5">?</span></div><div class="col-12"><label class="form-label">Message</label><textarea class="form-control" rows="5"></textarea></div><div class="col-12"><button type="submit" class="btn" style="background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;font-weight:700">Submit Feedback</button></div></div></form></div></main><script>document.querySelectorAll('.star').forEach(st=>st.addEventListener('click',()=>{const r=Number(st.dataset.rate);document.querySelectorAll('.star').forEach(x=>x.classList.toggle('active',Number(x.dataset.rate)<=r));}));document.addEventListener('DOMContentLoaded',
function(){
  const form = document.querySelector('form');
  if(form){
    form.addEventListener('submit',function(e){
      e.preventDefault();
      const subject = form.querySelector(
      'input[name="subject"]') ||
      form.querySelectorAll('input')[0];
      const message = form.querySelector(
      'textarea');

      if(!subject?.value || !message?.value){
        alert('Please fill all fields!');
        return;
      }
      alert('Feedback submitted successfully!\n'+
      'We will respond within 24 hours.');
      form.reset();
      const stars = document.querySelectorAll(
      '.star, .rating-star, [class*="star"]');
      stars.forEach(s => s.classList
      .remove('active','selected','gold'));
    });
  }
});</script></body></html>
