<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Settings | Air Arabian Travels</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{margin:0;font-family:Poppins,sans-serif;background:#f5f5f5}.main{max-width:900px;margin:30px auto}.cardx{background:#fff;border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.08);padding:18px}.preview-img{display:none;max-width:100px;max-height:100px;border:1px solid #ddd;border-radius:8px}</style></head><body><main class="main"><div class="cardx"><h3 class="h5 fw-bold">Settings</h3><div class="row g-3"><div class="col-md-6"><label class="form-label">Agency Name</label><input class="form-control" value="AIR ARABIAN TRAVEL"></div><div class="col-md-6"><label class="form-label">Mobile</label><input class="form-control"></div><div class="col-md-8"><label class="form-label">Choose Logo</label><input type="file" class="form-control" id="logoInput" accept="image/*"></div><div class="col-md-4"><label class="form-label">Preview</label><img id="logoPreview" class="preview-img" alt="preview"></div><div class="col-12"><button type="submit" class="btn" style="background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;font-weight:700">Update</button></div></div></div></main><script>document.addEventListener('DOMContentLoaded',
function(){
  const updateBtn = document.querySelector(
  'button[type="submit"]') ||
  Array.from(document.querySelectorAll('button'))
  .find(b => b.textContent.includes('Update'));

  if(updateBtn){
    updateBtn.addEventListener('click',
    function(e){
      e.preventDefault();
      alert('Profile updated successfully!');
    });
  }

  const logoInput = document.querySelector(
  'input[type="file"]');
  const preview = document.querySelector(
  '#logoPreview, .preview-img, [id*="preview"]');

  if(logoInput && preview){
    logoInput.addEventListener('change',
    function(){
      const file = this.files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = e => {
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });
  }
});</script></body></html>
