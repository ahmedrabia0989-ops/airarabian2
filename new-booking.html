<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Booking | Air Arabian Travels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body{margin:0;font-family:Poppins,sans-serif;background:#f5f5f5}.sidebar{width:240px;position:fixed;left:0;top:0;bottom:0;background:#1a1a1a;padding:16px 0;overflow-y:auto}
    .sidebar-logo{padding:0 18px 14px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:12px}.sidebar-link{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none;padding:11px 16px;border-left:3px solid transparent}.sidebar-link i{color:#FFD700}.sidebar-link.active{border-left-color:#FFD700;color:#FFD700;background:rgba(255,215,0,.08)}
    .content{margin-left:240px}.topbar{background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.08);padding:14px 24px}.main{padding:22px}.section-card{background:#fff;border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.08);padding:20px}
    .category-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08);border:2px solid transparent;cursor:pointer;transition:.3s;height:100%}.category-card:hover{transform:translateY(-5px);border-color:#FFD700}.category-card img{width:100%;height:180px;object-fit:cover}.category-body{padding:15px}
  </style>
</head>
<body>
  <aside class="sidebar" id="vendorSidebar">
    <div class="sidebar-logo"><img src="../assets/images/logo.png" height="45" style="object-fit:contain;"></div>
    <a class="sidebar-link" href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <a class="sidebar-link active" href="new-booking.html"><i class="bi bi-plus-circle"></i>New Booking</a>
    <a class="sidebar-link" href="tickets.html"><i class="bi bi-ticket-perforated"></i>My Tickets Booking</a>
    <a class="sidebar-link" href="umrah-booking.html"><i class="bi bi-moon-stars"></i>My Umrah Booking</a>
    <a class="sidebar-link" href="bank-accounts.html"><i class="bi bi-bank"></i>Bank Accounts</a>
    <a class="sidebar-link" href="ledger.html"><i class="bi bi-journal-text"></i>Accounts Ledger</a>
    <a class="sidebar-link" href="feedback.html"><i class="bi bi-chat-dots"></i>Feedback</a>
    <a class="sidebar-link" href="settings.html"><i class="bi bi-gear"></i>Settings</a>
    <a class="sidebar-link" href="contact-us.html"><i class="bi bi-envelope"></i>Contact Us</a>
  </aside>
  <div class="content">
    <header class="topbar"><h1 class="h4 m-0 fw-bold">New Booking</h1></header>
    <main class="main">
      <section class="section-card mb-4">
        <div class="row g-3">
          <div class="col-md-6"><input type="search" class="form-control" placeholder="KEYWORD..."></div>
          <div class="col-md-6"><input type="date" class="form-control" placeholder="DD-MM-YYYY"></div>
        </div>
      </section>
      <section><div class="row g-4">
        <div class="col-xl-4 col-md-6"><article class="category-card" onclick="window.location.href='booking-groups.html'"><img src="https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?w=400" alt=""><div class="category-body"><h5 class="fw-bold text-dark">UMRAH PACKAGE</h5><p class="mb-0 text-secondary">COMPLETE UMRAH PACKAGE</p></div></article></div>
        <div class="col-xl-4 col-md-6"><article class="category-card" onclick="window.location.href='booking-groups.html'"><img src="https://images.unsplash.com/photo-1564769625905-50e93615e769?w=400" alt=""><div class="category-body"><h5 class="fw-bold text-dark">Umrah Tickets</h5><p class="mb-0 text-secondary">Kingdom of Saudi Arabia</p></div></article></div>
        <div class="col-xl-4 col-md-6"><article class="category-card" onclick="window.location.href='booking-groups.html'"><img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=400" alt=""><div class="category-body"><h5 class="fw-bold text-dark">UAE Flights</h5><p class="mb-0 text-secondary">United Arab Emirates</p></div></article></div>
      </div></section>
    </main>
  </div>
  <script>
const cards = document.querySelectorAll('.category-card');
const searchInput = document.querySelector('input[placeholder*="KEYWORD"]') ||
document.querySelector('input[type="search"]') ||
document.querySelector('input[type="text"]');
const dateInput = document.querySelector('input[type="date"]') ||
document.querySelector('input[placeholder*="DD-MM"]');

if(searchInput){
  searchInput.addEventListener('input', function(){
    const val = this.value.toLowerCase();
    cards.forEach(card => {
      const text = card.textContent.toLowerCase();
      card.style.display =
      text.includes(val) ? 'block' : 'none';
    });
  });
}

if(dateInput){
  dateInput.addEventListener('change', function(){
    alert('Filtering by date: '+this.value);
  });
}
  </script>
</body>
</html>
