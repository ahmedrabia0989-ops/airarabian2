<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Contact Us | Air Arabian Travels</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{margin:0;font-family:Poppins,sans-serif;background:#f5f5f5}.main{max-width:900px;margin:30px auto}.cardx{background:#fff;border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.08);padding:18px}</style></head><body><main class="main"><div class="cardx"><h3 class="h5 fw-bold">Contact Us</h3><form><div class="row g-3"><div class="col-md-6"><label>Name</label><input required class="form-control"></div><div class="col-md-6"><label>Email</label><input required type="email" class="form-control"></div><div class="col-12"><label>Subject</label><input required class="form-control"></div><div class="col-12"><label>Message</label><textarea required class="form-control" rows="5"></textarea></div><div class="col-12"><button type="submit" class="btn" style="background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;font-weight:700">Send Message</button></div></div></form></div></main><script>document.addEventListener('DOMContentLoaded',
function(){
  const form = document.querySelector('form');
  if(form){
    form.addEventListener('submit',function(e){
      e.preventDefault();
      const inputs = form.querySelectorAll(
      'input[required], textarea[required]');
      let valid = true;
      inputs.forEach(i => {
        if(!i.value){
          i.style.border='2px solid #C0392B';
          valid = false;
        } else {
          i.style.border='';
        }
      });
      if(valid){
        alert('Message sent successfully!\n'+
        'We will reply within 2 hours.');
        form.reset();
      }
    });
  }
});</script></body></html>
